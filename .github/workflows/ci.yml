name: CI — sf-webdriverio

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging]
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options: [all, web, api]

# Minimal default permissions — jobs escalate only what they need
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Dependency install & cache ──────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  # ── 2. Dynamic matrix test run ─────────────────────────────────────────────
  test:
    name: Test — ${{ matrix.browser }} / ${{ matrix.environment }}
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
        environment: [dev, staging]

    env:
      TEST_ENV: ${{ matrix.environment }}
      BROWSER: ${{ matrix.browser }}
      CI: 'true'
      BASE_URL_DEV: ${{ secrets.BASE_URL_DEV }}
      BASE_URL_STAGING: ${{ secrets.BASE_URL_STAGING }}
      API_BASE_URL_DEV: ${{ secrets.API_BASE_URL_DEV }}
      API_BASE_URL_STAGING: ${{ secrets.API_BASE_URL_STAGING }}
      TEST_USERNAME_DEV: ${{ secrets.TEST_USERNAME_DEV }}
      TEST_PASSWORD_DEV: ${{ secrets.TEST_PASSWORD_DEV }}
      TEST_USERNAME_STAGING: ${{ secrets.TEST_USERNAME_STAGING }}
      TEST_PASSWORD_STAGING: ${{ secrets.TEST_PASSWORD_STAGING }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Setup GeckoDriver
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-geckodriver@v1

      - name: Resolve environment variables for ${{ matrix.environment }}
        run: |
          if [ "${{ matrix.environment }}" = "dev" ]; then
            echo "BASE_URL=${BASE_URL_DEV:-https://demo.playwright.dev/todomvc}" >> "$GITHUB_ENV"
            echo "API_BASE_URL=${API_BASE_URL_DEV:-https://jsonplaceholder.typicode.com}" >> "$GITHUB_ENV"
            echo "TEST_USERNAME=${TEST_USERNAME_DEV:-your_username@example.com}" >> "$GITHUB_ENV"
            echo "TEST_PASSWORD=${TEST_PASSWORD_DEV:-your_password}" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=${BASE_URL_STAGING:-https://demo.playwright.dev/todomvc}" >> "$GITHUB_ENV"
            echo "API_BASE_URL=${API_BASE_URL_STAGING:-https://jsonplaceholder.typicode.com}" >> "$GITHUB_ENV"
            echo "TEST_USERNAME=${TEST_USERNAME_STAGING:-your_username@example.com}" >> "$GITHUB_ENV"
            echo "TEST_PASSWORD=${TEST_PASSWORD_STAGING:-your_password}" >> "$GITHUB_ENV"
          fi

      - name: Run tests — ${{ matrix.browser }} / ${{ matrix.environment }}
        run: |
          SUITE="${{ github.event.inputs.suite || 'all' }}"
          if [ "$SUITE" = "web" ]; then
            npx wdio run wdio.conf.ts --spec tests/web/
          elif [ "$SUITE" = "api" ]; then
            npx wdio run wdio.conf.ts --spec tests/api/
          else
            npx wdio run wdio.conf.ts
          fi
        continue-on-error: true

      - name: Upload Allure results (blob)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}-${{ matrix.environment }}
          path: allure-results/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}-${{ matrix.environment }}
          path: test-results/
          retention-days: 7
          if-no-files-found: warn

  # ── 3. Merge results & generate Allure report ──────────────────────────────
  report:
    name: Generate & publish Allure report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write  # needed to push to gh-pages

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure result blobs
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true  # branch may not exist yet on first run

      - name: Copy previous Allure history
        run: |
          if [ -d gh-pages/allure-report/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/allure-report/history/* allure-results/history/
            echo "✅ History restored from gh-pages"
          else
            echo "ℹ️  No previous history found — first run"
          fi

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 30

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          destination_dir: allure-report
          keep_files: true

      - name: Upload merged Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-merged
          path: allure-report/
          retention-days: 30
