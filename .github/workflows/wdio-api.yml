name: WebDriverIO API Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/api/**'
      - 'wdio.conf.ts'
      - 'package.json'
      - '.github/workflows/wdio-api.yml'
      - '.github/workflows/wdio-reusable.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/api/**'
      - 'wdio.conf.ts'
      - 'package.json'
      - '.github/workflows/wdio-api.yml'
      - '.github/workflows/wdio-reusable.yml'
  workflow_dispatch:
    inputs:
      test_env:
        description: >-
          Environment to run tests against (e.g. dev, staging, prod).
          Leave empty to use the default (dev).
        required: false
        default: 'dev'
        type: string
      targets:
        description: >-
          Comma-separated API test targets to run in parallel.
          Each entry can be a file (tests/api/users.spec.ts) or a @tag
          passed via --grep. Leave empty to run all API tests.
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    uses: ./.github/workflows/wdio-reusable.yml
    with:
      test_env: ${{ inputs.test_env || 'dev' }}
      targets: ${{ inputs.targets || '' }}
      workflow_name: wdio-api
      test_suite: api
      artifact_prefix: blob-report-api
      report_artifact_name: wdio-api-report
      func_name: api
      test_timeout: 30
      concurrency_group: pages-deploy-wdio-api
