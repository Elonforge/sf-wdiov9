name: Reusable WDIO Test & Deploy

on:
  workflow_call:
    inputs:
      test_env:
        description: 'Environment to run tests against (e.g. dev, staging, prod).'
        type: string
        default: 'dev'
      targetTests:
        description: >-
          Comma-separated tests to run. Each entry becomes its own matrix leg
          (its own VM). Entries can be mixed:
            • suite name         (e.g. "web", "api")          → --suite <name>
            • @tag               (e.g. "@smoke")              → --mochaOpts.grep <tag>
            • spec path          (e.g. "./tests/web/x.spec.ts") → --spec <path>
          Leave empty to run everything.
        type: string
        default: ''
      workflow_name:
        description: 'Identifier for this workflow (e.g. wdio, wdio-smoke, wdio-api, wdio-web).'
        type: string
        required: true
      artifact_prefix:
        description: 'Prefix for blob report artifacts (e.g. blob-report, blob-report-smoke).'
        type: string
        required: true
      report_artifact_name:
        description: 'Name for the final HTML report artifact (e.g. wdio-report, wdio-smoke-report).'
        type: string
        required: true
      func_name:
        description: 'Fixed function name for deploy folder. If empty, computed from targets.'
        type: string
        default: ''
      test_timeout:
        description: 'Timeout in minutes for each test matrix job.'
        type: number
        default: 30
      concurrency_group:
        description: >-
          Deprecated — kept for backwards-compat only. All deploys now share
          one global group ("gh-pages-deploy") so that pushes to gh-pages from
          different callers serialise correctly. Value is ignored.
        type: string
        required: false
        default: 'gh-pages-deploy'
      runs_on:
        description: >-
          Runner label(s) for the test job. Accepts a single label
          ("windows-latest") or a JSON array for self-hosted Windows VMs
          (e.g. '["self-hosted","windows","squad-alpha"]').
        type: string
        default: 'windows-latest'

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job 1: prepare – Build the matrix from comma-separated input ───────────
  prepare:
    name: Prepare test matrix
    runs-on: windows-latest
    permissions: {}

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: set-matrix
        shell: pwsh
        run: |
          $TargetTests = "${{ inputs.targetTests }}"
          if ([string]::IsNullOrWhiteSpace($TargetTests)) {
            $Matrix = '["all"]'
          } else {
            $items = $TargetTests -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
            $Matrix = $items | ConvertTo-Json -Compress
            if ($Matrix -notmatch '^\[') { $Matrix = "[$Matrix]" }
          }
          "matrix=$Matrix" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Host "Matrix: $Matrix"

  # ── Job 2: test – Run tests in parallel (one job per matrix target) ────────
  test:
    name: Test — ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ startsWith(inputs.runs_on, '[') && fromJson(inputs.runs_on) || inputs.runs_on }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.test_timeout }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        shell: pwsh
        run: |
          Write-Host "Verifying browser availability on runner..."
          Write-Host "WDIO manages browser drivers automatically via @wdio/local-runner."

      - name: Run tests
        shell: pwsh
        env:
          TEST_ENV: ${{ inputs.test_env }}
        run: |
          $Target = "${{ matrix.target }}"

          # Reporters are configured in wdio.conf.ts (spec + allure + video).
          # Do NOT override them here — CLI --reporter flags replace the config
          # array, which would drop the video reporter and allure custom options.

          # One matrix leg = one target. Route by prefix:
          #   "all"        → run everything in wdio.conf.ts
          #   "@..."       → tag, passed via --mochaOpts.grep
          #   "./tests/..."→ spec file or directory, passed via --spec
          #   anything else→ suite name, passed via --suite
          if ($Target -eq "all") {
            Write-Host "Running all tests"
            npx wdio run wdio.conf.ts
          } elseif ($Target.StartsWith("@")) {
            Write-Host "Running tag: $Target"
            npx wdio run wdio.conf.ts --mochaOpts.grep $Target
          } elseif ($Target.StartsWith("./tests/") -or $Target.StartsWith("./test/")) {
            # Directory entries get a glob appended so wdio picks up spec files.
            if (-not ($Target -match '\.\w+$')) {
              $Target = $Target.TrimEnd('/\') + "/**/*.spec.ts"
            }
            Write-Host "Running spec: $Target"
            npx wdio run wdio.conf.ts --spec $Target
          } else {
            Write-Host "Running suite: $Target"
            npx wdio run wdio.conf.ts --suite $Target
          }

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ strategy.job-index }}
          path: allure-results/
          retention-days: 7
          if-no-files-found: warn

  # ── Job 3: merge-reports – Merge all reports into a single HTML report ─────
  merge-reports:
    name: Merge reports
    needs: [test]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Download all blob report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.artifact_prefix }}-*
          path: all-blob-reports
          merge-multiple: true

      - name: Generate Allure HTML report
        shell: pwsh
        run: |
          # Artifacts were uploaded with `path: allure-results/`, so
          # `merge-multiple: true` flattens every shard's contents directly
          # into `all-blob-reports/`. Use it as the input dir directly —
          # no extra copy pass, no filename collisions.
          $mergedDir = "all-blob-reports"
          Write-Host "Merged allure results:"
          $items = Get-ChildItem $mergedDir -ErrorAction SilentlyContinue
          if ($items) { $items | Format-Table -AutoSize } else { Write-Host "  (empty)" }

          # Build dynamic report name
          $FuncName    = "${{ inputs.func_name }}"
          $TargetTests = "${{ inputs.targetTests }}"
          $Workflow    = "${{ inputs.workflow_name }}"

          $Suffix = ""
          if ($FuncName -ne "")       { $Suffix = $FuncName }
          elseif ($TargetTests -ne "") { $Suffix = $TargetTests }
          else                         { $Suffix = $Workflow }

          $ReportName = "WDIO-TestAutomation_Results_Report"
          if ($Suffix -ne "") { $ReportName = "$ReportName - $Suffix" }

          Write-Host "Report name: $ReportName"
          # Use allure-commandline directly via npx — no project install needed.
          npx --yes -p allure-commandline@2 allure generate $mergedDir -o allure-report --report-name "$ReportName"

          # Inject SPA route-restoration script into the Allure index.html.
          # Works together with 404.html: a deep-link refresh is redirected by
          # 404.html to "<reportRoot>/?/<deeppath>", and this snippet rewrites
          # the URL back to "<reportRoot>/<deeppath>" via history.replaceState
          # *before* Allure's app JS reads window.location. Based on the
          # spa-github-pages pattern (rafgraph/spa-github-pages).
          $indexPath = "allure-report/index.html"
          if (Test-Path $indexPath) {
            $spaScript = @'
          <script>
          (function(l){if(l.search[1]==='/'){var d=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')}).join('?');window.history.replaceState(null,null,l.pathname.slice(0,-1)+d+l.hash)}}(window.location));
          </script>
          '@
            $html = Get-Content $indexPath -Raw
            # Inject at the very top of <head> so the URL is rewritten before
            # Allure's own scripts read window.location.
            if ($html -match '<head[^>]*>') {
              $html = $html -replace '(<head[^>]*>)', "`$1`n$spaScript"
              Set-Content $indexPath -Value $html -NoNewline
              Write-Host "Injected SPA route-restoration script into index.html"
            } else {
              Write-Host "Warning: Could not find <head> in index.html, skipping SPA script injection"
            }
          }

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.report_artifact_name }}
          path: allure-report/
          retention-days: 30

  # ── Job 4: deploy-report – Publish report to gh-pages branch ──────────────
  # Each run publishes to /runs/<workflow_name>/<run_id>/. Run IDs are
  # globally unique so parallel runs never touch the same files; the
  # retry-rebase loop + concurrency group keep gh-pages pushes safe.
  # No dashboard, no history pages, no pruning — just the per-run report.
  deploy-report:
    name: Deploy report to Pages
    needs: [merge-reports]
    if: ${{ always() && needs.merge-reports.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download merged HTML report
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.report_artifact_name }}
          path: new-report

      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1
        continue-on-error: true

      - name: Initialise gh-pages branch if it does not exist
        if: steps.checkout-gh-pages.outcome == 'failure'
        run: |
          rm -rf gh-pages
          mkdir -p gh-pages
          cd gh-pages
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Initialise gh-pages branch"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -u origin gh-pages

      - name: Add report to site
        run: |
          set -euo pipefail
          WORKFLOW="${{ inputs.workflow_name }}"
          RUN_ID="${{ github.run_id }}"
          mkdir -p "gh-pages/runs/${WORKFLOW}/${RUN_ID}"
          rsync -a --exclude='*.zip' new-report/ "gh-pages/runs/${WORKFLOW}/${RUN_ID}/"
          echo "Published to /runs/${WORKFLOW}/${RUN_ID}/"


      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy ${{ inputs.workflow_name }} report for run ${{ github.run_id }}"

            # Push with retry in case another workflow run pushed concurrently
            PUSHED=false
            for attempt in 1 2 3 4 5; do
              if git push origin gh-pages; then
                echo "Pushed to gh-pages (attempt $attempt)"
                PUSHED=true
                break
              fi
              echo "Push failed (attempt $attempt/5), rebasing and retrying..."
              if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
                git pull --rebase origin gh-pages
              fi
              sleep $((attempt * 2))
            done

            if [ "$PUSHED" != "true" ]; then
              echo "ERROR: Failed to push to gh-pages after 5 attempts"
              exit 1
            fi
          fi

      - name: Wait for GitHub Pages to publish report
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/runs/${{ inputs.workflow_name }}/${{ github.run_id }}/"
          echo "Polling ${REPORT_URL} until it returns 200 (max 5 min)..."
          DEADLINE=$(( $(date +%s) + 300 ))
          ATTEMPT=0
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "${REPORT_URL}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Report live after ${ATTEMPT} attempt(s)."
              exit 0
            fi
            echo "  attempt ${ATTEMPT}: HTTP ${STATUS} — retrying in 10s"
            sleep 10
          done
          echo "⚠ Timed out waiting for Pages deployment. Report may still appear shortly."
          exit 0

      - name: Report URL
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/runs/${{ inputs.workflow_name }}/${{ github.run_id }}/"
          echo "Report deployed via gh-pages branch."
          echo "Stable URL: ${REPORT_URL}"
