name: Reusable WDIO Test & Deploy

on:
  workflow_call:
    inputs:
      test_env:
        description: 'Environment to run tests against (e.g. dev, staging, prod).'
        type: string
        default: 'dev'
      targets:
        description: >-
          Comma-separated test targets to run in parallel.
          Each entry can be a file, a directory, or a @tag passed via --grep.
          Leave empty to run all tests.
        type: string
        default: ''
      workflow_name:
        description: 'Identifier for this workflow (e.g. wdio, wdio-smoke, wdio-api, wdio-web).'
        type: string
        required: true
      test_suite:
        description: 'WDIO suite(s) to run, comma-separated (e.g. "api", "web", "web,api"). Leave empty for all suites.'
        type: string
        default: ''
      artifact_prefix:
        description: 'Prefix for blob report artifacts (e.g. blob-report, blob-report-smoke).'
        type: string
        required: true
      report_artifact_name:
        description: 'Name for the final HTML report artifact (e.g. wdio-report, wdio-smoke-report).'
        type: string
        required: true
      func_name:
        description: 'Fixed function name for deploy folder. If empty, computed from targets.'
        type: string
        default: ''
      test_timeout:
        description: 'Timeout in minutes for each test matrix job.'
        type: number
        default: 30
      concurrency_group:
        description: >-
          Deprecated — kept for backwards-compat only. All deploys now share
          one global group ("gh-pages-deploy") so that pushes to gh-pages from
          different callers serialise correctly. Value is ignored.
        type: string
        required: false
        default: 'gh-pages-deploy'
      runs_on:
        description: >-
          Runner label(s) for the test job. Accepts a single label
          ("windows-latest") or a JSON array for self-hosted Windows VMs
          (e.g. '["self-hosted","windows","squad-alpha"]').
        type: string
        default: 'windows-latest'

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job 1: prepare – Build the matrix from comma-separated input ───────────
  prepare:
    name: Prepare test matrix
    runs-on: windows-latest
    permissions: {}

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: set-matrix
        shell: pwsh
        run: |
          $Targets = "${{ inputs.targets }}"
          if ([string]::IsNullOrWhiteSpace($Targets)) {
            $Matrix = '["all"]'
          } else {
            $items = $Targets -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
            $Matrix = $items | ConvertTo-Json -Compress
            if ($Matrix -notmatch '^\[') { $Matrix = "[$Matrix]" }
          }
          "matrix=$Matrix" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Host "Matrix: $Matrix"

  # ── Job 2: test – Run tests in parallel (one job per matrix target) ────────
  test:
    name: Test — ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ startsWith(inputs.runs_on, '[') && fromJson(inputs.runs_on) || inputs.runs_on }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.test_timeout }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        shell: pwsh
        run: |
          Write-Host "Verifying browser availability on runner..."
          Write-Host "WDIO manages browser drivers automatically via @wdio/local-runner."

      - name: Run tests
        shell: pwsh
        env:
          TEST_ENV: ${{ inputs.test_env }}
        run: |
          $Target = "${{ matrix.target }}"
          $Suite  = "${{ inputs.test_suite }}"

          # Reporters are configured in wdio.conf.ts (spec + allure + video).
          # Do NOT override them here — CLI --reporter flags replace the config
          # array, which would drop the video reporter and allure custom options.

          # Build optional --suite flags (one per comma-separated suite name).
          # WDIO accepts repeated --suite flags to run multiple suites together.
          $SuiteFlag = @()
          if ($Suite -ne "") {
            foreach ($s in ($Suite -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' })) {
              $SuiteFlag += @("--suite", $s)
            }
          }

          if ($Target -eq "all") {
            npx wdio run wdio.conf.ts @SuiteFlag
          } elseif ($Target.StartsWith("@")) {
            npx wdio run wdio.conf.ts @SuiteFlag --mochaOpts.grep $Target
          } else {
            # Ensure directory paths get a proper glob pattern
            if (-not ($Target -match '\.\w+$')) {
              $Target = $Target.TrimEnd('/\') + "/**/*.spec.ts"
            }
            npx wdio run wdio.conf.ts --spec $Target
          }

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ strategy.job-index }}
          path: allure-results/
          retention-days: 7
          if-no-files-found: warn

  # ── Job 3: merge-reports – Merge all reports into a single HTML report ─────
  merge-reports:
    name: Merge reports
    needs: [test]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Download all blob report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.artifact_prefix }}-*
          path: all-blob-reports
          merge-multiple: true

      - name: Generate Allure HTML report
        shell: pwsh
        run: |
          # Artifacts were uploaded with `path: allure-results/`, so
          # `merge-multiple: true` flattens every shard's contents directly
          # into `all-blob-reports/`. Use it as the input dir directly —
          # no extra copy pass, no filename collisions.
          $mergedDir = "all-blob-reports"
          Write-Host "Merged allure results:"
          $items = Get-ChildItem $mergedDir -ErrorAction SilentlyContinue
          if ($items) { $items | Format-Table -AutoSize } else { Write-Host "  (empty)" }

          # Build dynamic report name
          $FuncName = "${{ inputs.func_name }}"
          $Suite    = "${{ inputs.test_suite }}"
          $Targets  = "${{ inputs.targets }}"
          $Workflow = "${{ inputs.workflow_name }}"

          $Suffix = ""
          if ($FuncName -ne "") { $Suffix = $FuncName }
          elseif ($Suite -ne "")   { $Suffix = $Suite }
          elseif ($Targets -ne "") { $Suffix = $Targets }
          else                     { $Suffix = $Workflow }

          $ReportName = "WDIO-TestAutomation_Results_Report"
          if ($Suffix -ne "") { $ReportName = "$ReportName - $Suffix" }

          Write-Host "Report name: $ReportName"
          # Use allure-commandline directly via npx — no project install needed.
          npx --yes -p allure-commandline@2 allure generate $mergedDir -o allure-report --report-name "$ReportName"

          # Inject SPA route-restoration script into the Allure index.html.
          # Works together with 404.html: a deep-link refresh is redirected by
          # 404.html to "<reportRoot>/?/<deeppath>", and this snippet rewrites
          # the URL back to "<reportRoot>/<deeppath>" via history.replaceState
          # *before* Allure's app JS reads window.location. Based on the
          # spa-github-pages pattern (rafgraph/spa-github-pages).
          $indexPath = "allure-report/index.html"
          if (Test-Path $indexPath) {
            $spaScript = @'
          <script>
          (function(l){if(l.search[1]==='/'){var d=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')}).join('?');window.history.replaceState(null,null,l.pathname.slice(0,-1)+d+l.hash)}}(window.location));
          </script>
          '@
            $html = Get-Content $indexPath -Raw
            # Inject at the very top of <head> so the URL is rewritten before
            # Allure's own scripts read window.location.
            if ($html -match '<head[^>]*>') {
              $html = $html -replace '(<head[^>]*>)', "`$1`n$spaScript"
              Set-Content $indexPath -Value $html -NoNewline
              Write-Host "Injected SPA route-restoration script into index.html"
            } else {
              Write-Host "Warning: Could not find <head> in index.html, skipping SPA script injection"
            }
          }

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.report_artifact_name }}
          path: allure-report/
          retention-days: 30

  # ── Job 4: deploy-report – Deploy to GitHub Pages (gh-pages branch) ────────
  # Uses a gh-pages branch for persistent, merge-safe history instead of cache.
  # Each run gets a stable URL at /runs/<workflow>/<run_id>/ and a descriptive
  # history entry at /history/<env>--<func>--<timestamp>/.
  # The concurrency group is scoped here so test jobs can run in parallel
  # across workflow runs while deployments are serialised.
  deploy-report:
    name: Deploy report to Pages
    needs: [merge-reports]
    # Only deploy when merge-reports actually produced a report. Prevents
    # overwriting /latest/ with an empty directory if every matrix leg errored.
    if: ${{ always() && needs.merge-reports.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
    # Single shared group so deploys across all callers serialise on gh-pages.
    # The caller's `concurrency_group` input is kept for backwards-compat but
    # is no longer used for ordering — all deploys contend for one slot.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}runs/${{ inputs.workflow_name }}/${{ github.run_id }}/
    steps:
      - name: Download merged HTML report
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.report_artifact_name }}
          path: new-report

      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1
        continue-on-error: true

      - name: Initialise gh-pages branch if it does not exist
        if: steps.checkout-gh-pages.outcome == 'failure'
        run: |
          rm -rf gh-pages
          mkdir -p gh-pages
          cd gh-pages
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Initialise gh-pages branch"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -u origin gh-pages

      - name: Add report to site
        run: |
          set -euo pipefail

          # ── Build descriptive folder name ──────────────────────────────────
          ENV_NAME="${{ inputs.test_env }}"
          [ -z "$ENV_NAME" ] && ENV_NAME="dev"

          FUNC_NAME="${{ inputs.func_name }}"
          if [ -z "$FUNC_NAME" ]; then
            TARGETS="${{ inputs.targets }}"
            if [ -z "$TARGETS" ]; then
              FUNC_NAME="all"
            else
              FUNC_NAME=$(echo "$TARGETS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' | while read -r t; do
                leaf=$(basename "${t%/}")
                leaf="${leaf%.*}"
                echo "$leaf" | sed 's/[^a-zA-Z0-9@_-]/-/g'
              done | paste -sd'+')
              [ ${#FUNC_NAME} -gt 80 ] && FUNC_NAME="${FUNC_NAME:0:80}"
            fi
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S")

          # Sanitize branch + actor for use in folder name.
          # Branch may be "feature/foo-bar" → "feature-foo-bar".
          BRANCH_RAW="${{ github.ref_name }}"
          BRANCH=$(echo "$BRANCH_RAW" | sed 's/[^a-zA-Z0-9_-]/-/g')
          [ -z "$BRANCH" ] && BRANCH="unknown"

          ACTOR_RAW="${{ github.actor }}"
          ACTOR=$(echo "$ACTOR_RAW" | sed 's/[^a-zA-Z0-9_-]/-/g')
          [ -z "$ACTOR" ] && ACTOR="unknown"

          SHA7="$(echo "${{ github.sha }}" | cut -c1-7)"
          [ -z "$SHA7" ] && SHA7="0000000"

          # History folder identifies the run completely:
          #   <env>--<func>--<branch>--<actor>--<sha7>--<timestamp>
          FOLDER_NAME="${ENV_NAME}--${FUNC_NAME}--${BRANCH}--${ACTOR}--${SHA7}--${TIMESTAMP}"
          RUN_ID="${{ github.run_id }}"
          WORKFLOW="${{ inputs.workflow_name }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          IS_DEFAULT_BRANCH="false"
          if [ "${{ github.ref }}" = "refs/heads/${DEFAULT_BRANCH}" ]; then
            IS_DEFAULT_BRANCH="true"
          fi

          echo "History folder    : $FOLDER_NAME"
          echo "Stable run URL    : /runs/${WORKFLOW}/${RUN_ID}/"
          echo "Default branch?   : $IS_DEFAULT_BRANCH"

          # ── Copy report into per-run-ID folder (stable URL, never pruned
          #    by date — pruned only when its history entry ages out below) ──
          mkdir -p "gh-pages/runs/${WORKFLOW}/${RUN_ID}"
          rsync -a --exclude='*.zip' new-report/ "gh-pages/runs/${WORKFLOW}/${RUN_ID}/"

          # ── Copy into descriptive history folder ───────────────────────────
          mkdir -p "gh-pages/history/${FOLDER_NAME}"
          rsync -a --exclude='*.zip' new-report/ "gh-pages/history/${FOLDER_NAME}/"

          # ── Copy as "latest" only on default-branch runs ───────────────────
          # Feature-branch / dev-stream runs must NOT move /latest/.
          if [ "$IS_DEFAULT_BRANCH" = "true" ]; then
            mkdir -p gh-pages/latest
            rsync -a --delete new-report/ gh-pages/latest/
            echo "Updated /latest/ (default-branch run)"
          else
            echo "Skipped /latest/ update (non-default branch)"
          fi

          # ── Prune history: delete entries older than 60 days ───────────────
          # Folder name ends in "--YYYY-MM-DD_HH-MM-SS". Compare against a
          # cutoff timestamp (UTC) computed once.
          CUTOFF=$(date -u -d '60 days ago' +"%Y-%m-%d_%H-%M-%S" 2>/dev/null || \
                   date -u -v-60d +"%Y-%m-%d_%H-%M-%S")
          echo "Pruning history entries older than: $CUTOFF"
          cd gh-pages/history
          for d in */; do
            d="${d%/}"
            ts="${d##*--}"
            if [[ "$ts" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{2}-[0-9]{2}-[0-9]{2}$ ]] && \
               [[ "$ts" < "$CUTOFF" ]]; then
              echo "Pruning old history entry: $d (ts=$ts)"
              rm -rf "$d"
            fi
          done
          cd ../..

          # ── Prune runs: delete run-ID folders whose mtime is > 60 days ─────
          # Run-ID folders have no timestamp in the name, so use mtime instead.
          if [ -d "gh-pages/runs/${WORKFLOW}" ]; then
            cd "gh-pages/runs/${WORKFLOW}"
            find . -maxdepth 1 -mindepth 1 -type d -mtime +60 -print -exec rm -rf {} +
            cd ../../..
          fi

      - name: Generate dashboard and history pages
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          SERVER_URL="${{ github.server_url }}"

          # ── Build root index.html (dashboard) ──────────────────────────────
          cat > gh-pages/index.html << 'DASHBOARD_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <title>Test Reports Dashboard</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;padding:2rem}
              h1{margin-bottom:.25rem}
              .subtitle{color:#666;margin-bottom:1.5rem;font-size:.95rem}
              .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem}
              .card{background:#fff;border-radius:10px;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.08);text-decoration:none;color:inherit;transition:box-shadow .15s,transform .15s}
              .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px)}
              .card h2{font-size:1.1rem;margin-bottom:.5rem}
              .card p{font-size:.85rem;color:#666}
              .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;margin-left:.5rem;vertical-align:middle}
              .badge-latest{background:#e8f5e9;color:#2e7d32}
              .badge-history{background:#e3f2fd;color:#1565c0}
              .badge-runs{background:#fff3e0;color:#e65100}
              hr{border:none;border-top:1px solid #e0e0e0;margin:1.5rem 0}
              h3{margin-bottom:.75rem}
              table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
              th{background:#1a73e8;color:#fff;text-align:left;padding:.75rem 1rem;font-size:.9rem}
              td{padding:.75rem 1rem;border-bottom:1px solid #eee;font-size:.9rem}
              tr:last-child td{border-bottom:none}
              tr:hover td{background:#e8f0fe}
              td a{color:#1a73e8;text-decoration:none}
              td a:hover{text-decoration:underline}
              .env-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.8rem;font-weight:600}
              .env-dev{background:#e8f5e9;color:#2e7d32}
              .env-staging{background:#fff3e0;color:#e65100}
              .env-prod{background:#fce4ec;color:#c62828}
              .env-default{background:#e3f2fd;color:#1565c0}
            </style>
          </head>
          <body>
            <h1>🧪 Test Reports Dashboard</h1>
            <p class="subtitle">Each workflow run has its own stable URL — concurrent runs are safe.</p>

            <div class="cards">
              <a class="card" href="latest/">
                <h2>📄 Latest Report <span class="badge badge-latest">latest</span></h2>
                <p>Jump to the most recent test report.</p>
              </a>
              <a class="card" href="history/">
                <h2>📊 Full History <span class="badge badge-history">history</span></h2>
                <p>Browse all reports by environment, functionality &amp; date.</p>
              </a>
              <a class="card" href="runs/">
                <h2>🔗 By Run ID <span class="badge badge-runs">runs</span></h2>
                <p>Look up a specific workflow run by its GitHub run ID.</p>
              </a>
            </div>

            <hr/>
            <h3>Recent Runs <small style="font-weight:400;color:#888">(last 10 — filter to find your own)</small></h3>
            <input id="filter" type="search" placeholder="Filter by branch, actor, env, func…" style="width:100%;padding:.6rem .8rem;margin-bottom:.75rem;border:1px solid #ccc;border-radius:6px;font-size:.9rem"/>
            <table>
              <thead><tr><th>Env</th><th>Func</th><th>Branch</th><th>Actor</th><th>Commit</th><th>Date (UTC)</th><th>Report</th></tr></thead>
              <tbody id="recent"></tbody>
            </table>

            <script>
          DASHBOARD_EOF

          # Inject the entries array from the history folder
          echo '      const entries = [' >> gh-pages/index.html
          if [ -d gh-pages/history ]; then
            ls -d gh-pages/history/*/ 2>/dev/null | sed 's:/$::' | awk -F'--' '{print $NF"\t"$0}' | sort -r | cut -f2- | head -10 | while read -r d; do
              name=$(basename "$d")
              echo "        \"${name}\"," >> gh-pages/index.html
            done
          fi
          echo '      ];' >> gh-pages/index.html

          cat >> gh-pages/index.html << 'DASHBOARD_JS_EOF'
              // Folder name format:
              //   <env>--<func>--<branch>--<actor>--<sha7>--<YYYY-MM-DD_HH-MM-SS>
              // Older 3-segment entries (<env>--<func>--<ts>) are still parsed.
              function parseEntry(name) {
                const parts = name.split('--');
                const ts = parts[parts.length - 1] || '';
                let env = '', func = '', branch = '', actor = '', sha = '';
                if (parts.length >= 6) {
                  env    = parts[0];
                  func   = parts.slice(1, parts.length - 4).join(', ');
                  branch = parts[parts.length - 4];
                  actor  = parts[parts.length - 3];
                  sha    = parts[parts.length - 2];
                } else if (parts.length >= 3) {
                  env  = parts[0];
                  func = parts.slice(1, -1).join(', ');
                } else {
                  env = parts[0] || '—';
                  func = parts[1] || '—';
                }
                const displayTs = ts.replace('_', ' ').replace(/-/g, (m, o) => o > 9 ? ':' : '-');
                return { env, func, branch, actor, sha, displayTs };
              }
              const tbody = document.getElementById('recent');
              function render(filter) {
                tbody.innerHTML = '';
                const f = (filter || '').toLowerCase();
                let shown = 0;
                entries.forEach(name => {
                  if (f && name.toLowerCase().indexOf(f) === -1) return;
                  const e = parseEntry(name);
                  const envClass = ['dev','staging','prod'].includes(e.env) ? 'env-' + e.env : 'env-default';
                  const tr = document.createElement('tr');
                  tr.innerHTML =
                    '<td><span class="env-badge ' + envClass + '">' + e.env + '</span></td>' +
                    '<td>' + (e.func || '—').replace(/\+/g, ', ') + '</td>' +
                    '<td>' + (e.branch || '—') + '</td>' +
                    '<td>' + (e.actor || '—') + '</td>' +
                    '<td><code>' + (e.sha || '—') + '</code></td>' +
                    '<td>' + e.displayTs + '</td>' +
                    '<td><a href="history/' + name + '/">View</a></td>';
                  tbody.appendChild(tr);
                  shown++;
                });
                if (!shown) {
                  const tr = document.createElement('tr');
                  tr.innerHTML = '<td colspan="7" style="text-align:center">No matching reports.</td>';
                  tbody.appendChild(tr);
                }
              }
              render('');
              document.getElementById('filter').addEventListener('input', e => render(e.target.value));
            </script>
          </body>
          </html>
          DASHBOARD_JS_EOF

          # ── Generate history/index.html ──────────────────────────────────────
          cat > gh-pages/history/index.html << 'HIST_HEAD_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <title>Test Report History</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;padding:2rem}
              h1{margin-bottom:.5rem}
              .back{display:inline-block;margin-bottom:1.5rem;color:#1a73e8;text-decoration:none;font-size:.95rem}
              .back:hover{text-decoration:underline}
              table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
              th{background:#1a73e8;color:#fff;text-align:left;padding:.75rem 1rem;font-size:.9rem}
              td{padding:.75rem 1rem;border-bottom:1px solid #eee;font-size:.9rem}
              tr:last-child td{border-bottom:none}
              tr:hover td{background:#e8f0fe}
              td a{color:#1a73e8;text-decoration:none}
              td a:hover{text-decoration:underline}
              .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.8rem;font-weight:600}
              .env-dev{background:#e8f5e9;color:#2e7d32}
              .env-staging{background:#fff3e0;color:#e65100}
              .env-prod{background:#fce4ec;color:#c62828}
              .env-default{background:#e3f2fd;color:#1565c0}
            </style>
          </head>
          <body>
            <h1>📊 Test Report History <small style="font-weight:400;color:#888">(60 days retained)</small></h1>
            <a class="back" href="../">← Dashboard</a>
            <input id="filter" type="search" placeholder="Filter by branch, actor, env, func, commit…" style="width:100%;padding:.6rem .8rem;margin-bottom:.75rem;border:1px solid #ccc;border-radius:6px;font-size:.9rem"/>
            <table>
              <thead><tr><th>Env</th><th>Func</th><th>Branch</th><th>Actor</th><th>Commit</th><th>Date (UTC)</th><th>Report</th></tr></thead>
              <tbody id="entries"></tbody>
            </table>
            <script>
          HIST_HEAD_EOF

          echo '      const entries = [' >> gh-pages/history/index.html
          if [ -d gh-pages/history ]; then
            ls -d gh-pages/history/*/ 2>/dev/null | sed 's:/$::' | awk -F'--' '{print $NF"\t"$0}' | sort -r | cut -f2- | while read -r d; do
              name=$(basename "$d")
              echo "        \"${name}\"," >> gh-pages/history/index.html
            done
          fi
          echo '      ];' >> gh-pages/history/index.html

          cat >> gh-pages/history/index.html << 'HIST_JS_EOF'
              function parseEntry(name) {
                const parts = name.split('--');
                const ts = parts[parts.length - 1] || '';
                let env = '', func = '', branch = '', actor = '', sha = '';
                if (parts.length >= 6) {
                  env    = parts[0];
                  func   = parts.slice(1, parts.length - 4).join(', ');
                  branch = parts[parts.length - 4];
                  actor  = parts[parts.length - 3];
                  sha    = parts[parts.length - 2];
                } else if (parts.length >= 3) {
                  env  = parts[0];
                  func = parts.slice(1, -1).join(', ');
                } else {
                  env = parts[0] || '—';
                  func = parts[1] || '—';
                }
                const displayTs = ts.replace('_', ' ').replace(/-/g, (m, o) => o > 9 ? ':' : '-');
                return { env, func, branch, actor, sha, displayTs };
              }
              const tbody = document.getElementById('entries');
              function render(filter) {
                tbody.innerHTML = '';
                const f = (filter || '').toLowerCase();
                let shown = 0;
                entries.forEach(name => {
                  if (f && name.toLowerCase().indexOf(f) === -1) return;
                  const e = parseEntry(name);
                  const envClass = ['dev','staging','prod'].includes(e.env) ? 'env-' + e.env : 'env-default';
                  const tr = document.createElement('tr');
                  tr.innerHTML =
                    '<td><span class="badge ' + envClass + '">' + e.env + '</span></td>' +
                    '<td>' + (e.func || '—').replace(/\+/g, ', ') + '</td>' +
                    '<td>' + (e.branch || '—') + '</td>' +
                    '<td>' + (e.actor || '—') + '</td>' +
                    '<td><code>' + (e.sha || '—') + '</code></td>' +
                    '<td>' + e.displayTs + '</td>' +
                    '<td><a href="' + name + '/">View Report</a></td>';
                  tbody.appendChild(tr);
                  shown++;
                });
                if (!shown) {
                  const tr = document.createElement('tr');
                  tr.innerHTML = '<td colspan="7" style="text-align:center">No matching entries.</td>';
                  tbody.appendChild(tr);
                }
              }
              render('');
              document.getElementById('filter').addEventListener('input', e => render(e.target.value));
            </script>
          </body>
          </html>
          HIST_JS_EOF

          # ── Generate runs/index.html ─────────────────────────────────────────
          mkdir -p gh-pages/runs
          cat > gh-pages/runs/index.html << 'RUNS_HEAD_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <title>Reports by Run ID</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;padding:2rem}
              h1{margin-bottom:.5rem}
              .back{display:inline-block;margin-bottom:1.5rem;color:#1a73e8;text-decoration:none;font-size:.95rem}
              .back:hover{text-decoration:underline}
              table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
              th{background:#1a73e8;color:#fff;text-align:left;padding:.75rem 1rem;font-size:.9rem}
              td{padding:.75rem 1rem;border-bottom:1px solid #eee;font-size:.9rem}
              tr:last-child td{border-bottom:none}
              tr:hover td{background:#e8f0fe}
              td a{color:#1a73e8;text-decoration:none}
              td a:hover{text-decoration:underline}
            </style>
          </head>
          <body>
            <h1>🔗 Reports by Run ID</h1>
            <a class="back" href="../">← Dashboard</a>
            <p style="margin-bottom:1.5rem;color:#666;font-size:.9rem">Each workflow run gets a permanent link. Share these URLs safely — they won't change.</p>
            <table>
              <thead><tr><th>Workflow</th><th>Run ID</th><th>Report</th></tr></thead>
              <tbody id="runs"></tbody>
            </table>
            <script>
          RUNS_HEAD_EOF

          # Collect run entries from the filesystem
          echo '      const runs = [' >> gh-pages/runs/index.html
          for wf_dir in gh-pages/runs/*/; do
            [ -d "$wf_dir" ] || continue
            wf=$(basename "$wf_dir")
            [ "$wf" = "index.html" ] && continue
            ls -d "${wf_dir}"*/ 2>/dev/null | sort -rn | while read -r rd; do
              rid=$(basename "$rd")
              echo "        {workflow:\"${wf}\",runId:\"${rid}\"}," >> gh-pages/runs/index.html
            done
          done
          echo '      ];' >> gh-pages/runs/index.html

          cat >> gh-pages/runs/index.html << 'RUNS_JS_EOF'
              const tbody = document.getElementById('runs');
              runs.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                  '<td>' + r.workflow + '</td>' +
                  '<td><code>' + r.runId + '</code></td>' +
                  '<td><a href="' + r.workflow + '/' + r.runId + '/">View Report</a></td>';
                tbody.appendChild(tr);
              });
              if (!runs.length) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="3" style="text-align:center">No runs recorded yet.</td>';
                tbody.appendChild(tr);
              }
            </script>
          </body>
          </html>
          RUNS_JS_EOF

          echo "Dashboard and index pages generated."

      - name: Generate 404.html for SPA routing
        run: |
          set -euo pipefail

          # Allure 3 uses history.pushState() for client-side routing.
          # When a user clicks a link inside the report, the URL path changes
          # (e.g. /latest/ → /latest/testresult/abc). If the browser does a
          # full navigation or the page is reloaded, GitHub Pages returns a
          # 404 because the path doesn't exist as a file. This 404.html
          # intercepts those requests and redirects back to the report's
          # index.html so the Allure SPA can handle the route.
          #
          # The SPA route (the portion after the report root) is stored in
          # sessionStorage so the Allure index.html can restore it via
          # history.replaceState after the <base> tag is set.

          cat > gh-pages/404.html << 'NOTFOUND_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <title>Redirecting…</title>
            <script>
              // spa-github-pages style redirect.
              // Rewrites the URL so the report root (which exists on disk and
              // serves Allure's index.html) is loaded, with the deep path
              // encoded as ?/<path>. The twin snippet in the Allure index.html
              // then restores the URL via history.replaceState *before* the
              // Allure app JS boots, so the SPA router picks up the right view.
              (function () {
                var l = window.location;
                var path = l.pathname;

                // Report root patterns — captures include the trailing slash.
                var patterns = [
                  /^(\/[^/]+\/runs\/[^/]+\/[^/]+\/)/,    // /<repo>/runs/<wf>/<id>/
                  /^(\/[^/]+\/history\/[^/]+\/)/,         // /<repo>/history/<name>/
                  /^(\/[^/]+\/latest\/)/                   // /<repo>/latest/
                ];

                var base;
                for (var i = 0; i < patterns.length; i++) {
                  var m = path.match(patterns[i]);
                  if (m) { base = m[1]; break; }
                }

                if (base) {
                  var rest = path.slice(base.length);
                  l.replace(
                    l.protocol + '//' + l.host + base + '?/' +
                    rest.replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash
                  );
                } else {
                  // Unknown path – fall back to the dashboard root.
                  var repoBase = path.match(/^(\/[^/]+\/)/);
                  l.replace(repoBase ? repoBase[1] : '/');
                }
              })();
            </script>
          </head>
          <body>
            <p>Redirecting to report…</p>
          </body>
          </html>
          NOTFOUND_EOF

          echo "404.html generated for SPA routing."

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy ${{ inputs.workflow_name }} report for run ${{ github.run_id }}"

            # Push with retry in case another workflow run pushed concurrently
            PUSHED=false
            for attempt in 1 2 3 4 5; do
              if git push origin gh-pages; then
                echo "Pushed to gh-pages (attempt $attempt)"
                PUSHED=true
                break
              fi
              echo "Push failed (attempt $attempt/5), rebasing and retrying..."
              if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
                git pull --rebase origin gh-pages
              fi
              sleep $((attempt * 2))
            done

            if [ "$PUSHED" != "true" ]; then
              echo "ERROR: Failed to push to gh-pages after 5 attempts"
              exit 1
            fi
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
