name: Squad Beta — WDIO Tests

# Template squad workflow. Duplicate this file per squad and change:
#   - the workflow `name:` (top of file)
#   - `workflow_name`, `artifact_prefix`, `report_artifact_name`,
#     `concurrency_group`
#   - the `runs_on` JSON array to match the squad's Windows VM runner labels

on:
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Environment (dev, staging, prod).'
        required: false
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      test_suite:
        description: >-
          WDIO suite name(s), comma-separated (e.g. "web", "api", "web,api").
          Leave empty if selecting targets instead.
        required: false
        default: ''
        type: string
      targets:
        description: >-
          Comma-separated targets. Each entry can be:
            • a spec file under ./tests/  (e.g. ./tests/web/todo.spec.ts)
            • a directory                  (e.g. ./tests/api/)
            • a tag starting with @        (e.g. @smoke)
          Each entry runs as its own parallel matrix leg. Leave empty to run
          everything in the selected suite(s).
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    uses: ./.github/workflows/wdio-reusable.yml
    with:
      test_env: ${{ inputs.test_env || 'dev' }}
      targets: ${{ inputs.targets || '' }}
      test_suite: ${{ inputs.test_suite || '' }}
      workflow_name: wdio-squad-beta
      artifact_prefix: blob-report-squad-beta
      report_artifact_name: wdio-squad-beta-report
      func_name: squad-beta
      test_timeout: 30
      concurrency_group: pages-deploy-wdio-squad-beta
      # Replace with the labels assigned to this squad's Windows VM(s).
      runs_on: '["self-hosted","windows","squad-beta"]'
