name: Squad Echo — WDIO Tests

# Template squad workflow. Duplicate this file per squad and change:
#   - the workflow `name:` (top of file)
#   - `workflow_name`, `artifact_prefix`, `report_artifact_name`
#   - the `runs_on` JSON array to match the squad's Windows VM runner labels

on:
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Environment (dev, staging, prod).'
        required: false
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      targetTests:
        description: >-
          Comma-separated tests. Mix and match freely — each entry runs in
          its own VM:
            • suite name       (e.g. web, api)
            • @tag             (e.g. @smoke)
            • spec path        (e.g. ./tests/web/todo.spec.ts)
          Empty = run everything.
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  run-tests:
    uses: ./.github/workflows/wdio-reusable.yml
    with:
      test_env: ${{ inputs.test_env || 'dev' }}
      targetTests: ${{ inputs.targetTests || '' }}
      workflow_name: wdio-squad-echo
      artifact_prefix: blob-report-squad-echo
      report_artifact_name: wdio-squad-echo-report
      func_name: squad-echo
      test_timeout: 30
      # Replace with the labels assigned to this squad's Windows VM(s).
      runs_on: '["self-hosted","windows","squad-echo"]'
