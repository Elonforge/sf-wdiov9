name: WebDriverIO Web UI Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/web/**'
      - 'pages/**'
      - 'wdio.conf.ts'
      - 'package.json'
      - '.github/workflows/wdio-web.yml'
      - '.github/workflows/wdio-reusable.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/web/**'
      - 'pages/**'
      - 'wdio.conf.ts'
      - 'package.json'
      - '.github/workflows/wdio-web.yml'
      - '.github/workflows/wdio-reusable.yml'
  workflow_dispatch:
    inputs:
      test_env:
        description: >-
          Environment to run tests against (e.g. dev, staging, prod).
          Leave empty to use the default (dev).
        required: false
        default: 'dev'
        type: string
      targets:
        description: >-
          Comma-separated web UI test targets to run in parallel.
          Each entry can be a file (tests/web/todo.spec.ts) or a @tag
          passed via --grep. Leave empty to run all web UI tests.
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    uses: ./.github/workflows/wdio-reusable.yml
    with:
      test_env: ${{ inputs.test_env || 'dev' }}
      targets: ${{ inputs.targets || '' }}
      workflow_name: wdio-web
      test_suite: web
      artifact_prefix: blob-report-web
      report_artifact_name: wdio-web-report
      func_name: web
      test_timeout: 30
      concurrency_group: pages-deploy-wdio-web
