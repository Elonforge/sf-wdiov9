name: WebDriverIO Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_env:
        description: >-
          Environment to run tests against (e.g. dev, staging, prod).
          Leave empty to use the default (dev).
        required: false
        default: 'dev'
        type: string
      targets:
        description: >-
          Comma-separated test targets to run in parallel.
          Each entry can be a file (tests/web/todo.spec.ts), a directory
          (tests/api/), or a @tag passed via --grep.
          Leave empty to run all tests.
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    uses: ./.github/workflows/wdio-reusable.yml
    with:
      test_env: ${{ inputs.test_env || 'dev' }}
      targets: ${{ inputs.targets || '' }}
      workflow_name: wdio
      test_suite: ''
      artifact_prefix: blob-report
      report_artifact_name: wdio-report
      func_name: ''
      test_timeout: 30
      concurrency_group: pages-deploy-wdio
