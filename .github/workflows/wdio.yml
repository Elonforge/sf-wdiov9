name: WebDriverIO Tests

# Single consolidated caller. Manual-only by design: any tester, on any
# branch, can dispatch this from the Actions tab. Each entry in
# `targetTests` runs as its own matrix leg on its own runner.

on:
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Environment (dev, staging, prod).'
        required: false
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      targetTests:
        description: >-
          Comma-separated tests. Mix and match freely — each entry runs in
          its own VM:
            • suite name       (e.g. web, api)
            • @tag             (e.g. @smoke)
            • spec path        (e.g. ./tests/web/todo.spec.ts)
          Empty = run everything.
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  run-tests:
    uses: ./.github/workflows/wdio-reusable.yml
    with:
      test_env: ${{ inputs.test_env || 'dev' }}
      targetTests: ${{ inputs.targetTests || '' }}
      workflow_name: wdio
      artifact_prefix: blob-report
      report_artifact_name: wdio-report
      func_name: ''
      test_timeout: 30
