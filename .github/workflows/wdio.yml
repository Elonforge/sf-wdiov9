name: WDIO Tests

on:
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Environment'
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      targets:
        description: 'Comma-separated: suite (web, api), @tag (@smoke), or spec path. Empty = all.'
        default: ''
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Run Tests & Generate Report
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        continue-on-error: true
        shell: pwsh
        env:
          CI: 'true'
          TEST_ENV: ${{ inputs.test_env }}
        run: |
          $Targets = "${{ inputs.targets }}"
          if ([string]::IsNullOrWhiteSpace($Targets)) {
            npx wdio run wdio.conf.ts
          } else {
            $items = $Targets -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
            foreach ($t in $items) {
              $env:WDIO_TARGET = $t
              if ($t.StartsWith("@")) {
                Write-Host "Running tag: $t"
                npx wdio run wdio.conf.ts --mochaOpts.grep $t
              } elseif ($t.StartsWith("./tests/") -or $t.StartsWith("./test/")) {
                if (-not ($t -match '\.\w+$')) { $t = $t.TrimEnd('/\') + "/**/*.spec.ts" }
                Write-Host "Running spec: $t"
                npx wdio run wdio.conf.ts --spec $t
              } else {
                Write-Host "Running suite: $t"
                npx wdio run wdio.conf.ts --suite $t
              }
              if ($LASTEXITCODE -ne 0) { Write-Host "Target '$t' had failures — continuing" }
            }
          }

      - name: Patch video stubs
        if: always()
        shell: pwsh
        run: |
          $allureDir = "allure-results"
          $videoDir  = "_results_"
          if ((Test-Path $allureDir) -and (Test-Path $videoDir)) {
            $count = 0
            Get-ChildItem $allureDir -Filter "*.mp4" | Where-Object { $_.Length -lt 1024 } | ForEach-Object {
              $videoPath = (Get-Content $_.FullName -Raw).Trim()
              if (Test-Path $videoPath) {
                Copy-Item $videoPath $_.FullName -Force
                Write-Host "Patched: $($_.Name)"
                $count++
              }
            }
            Write-Host "Patched $count video stub(s)"
          }

      - name: Generate Allure report
        if: always()
        shell: pwsh
        run: npx allure generate allure-results -o allure-report

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: always() && needs.test.result != 'cancelled'
    runs-on: windows-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: ${{ github.run_id }}
          keep_files: true

      - name: Report URL
        shell: pwsh
        run: |
          $url = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_id }}/"
          "## Allure Report`n**URL:** $url" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          Write-Host "Report: $url"
